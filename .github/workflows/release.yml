name: Android Auto Release

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant permission
        run: chmod +x gradlew

      # 🔐 Generate keystore
      - name: Generate keystore
        run: |
          keytool -genkeypair \
          -keystore keystore.jks \
          -storepass 123456 \
          -keypass 123456 \
          -alias key0 \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=CI,O=Auto,C=IN"

      # 🏗 Build unsigned release APK
      - name: Build unsigned release
        run: ./gradlew assembleRelease

      # ✍️ Sign APK manually
      - name: Sign APK
        run: |
          zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk app-release-aligned.apk
          apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:123456 \
            --key-pass pass:123456 \
            --out app-release.apk \
            app-release-aligned.apk

      # 📤 Upload final APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: auto-release-apk
          path: app-release.apk
